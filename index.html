<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>OMALI ERP</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.css" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css">

</head>

<body>

<!-- ================= LOGIN ================= -->

<div id="login" class="vh-100 d-flex justify-content-center align-items-center">

    <div class="card shadow-lg p-4 login-card">

        <div class="text-center">

            <h1 class="display-3">

                💧

            </h1>

            <h2 class="fw-bold">

                OMALI ERP

            </h2>

            <p class="text-muted">

                Sistema Inteligente de Agua

            </p>

        </div>

        <div class="mt-4">

            <label class="form-label">

                Usuario

            </label>

            <input
                type="text"
                id="usuario"
                class="form-control">

        </div>

        <div class="mt-3">

            <label class="form-label">

                Contraseña

            </label>

            <div class="input-group">

                <input
                    type="password"
                    id="password"
                    class="form-control">

                <button
                    type="button"
                    id="btnMostrarPassword"
                    class="btn btn-outline-secondary"
                    aria-label="Mostrar contrasena">

                    <i class="bi bi-eye"></i>

                </button>

            </div>

        </div>

        <button
            id="btnLogin"
            class="btn btn-primary mt-4">

            <i class="bi bi-box-arrow-in-right"></i>

            Iniciar sesión

        </button>

        <div
            id="mensaje"
            class="text-danger mt-3 text-center">

        </div>

    </div>

</div>

<!-- ================= DASHBOARD ================= -->

<div
    id="dashboard"
    style="display:none;">

    <!-- Barra superior -->

    <nav class="navbar navbar-dark bg-primary">

        <div class="container-fluid">

            <span class="navbar-brand">

                💧 OMALI ERP

            </span>

            <div class="text-white text-end">

                <strong id="nombreUsuario">

                </strong>

                <br>

                <small id="rolUsuario">

                </small>

            </div>

        </div>

    </nav>

    <!-- Menú -->

    <div class="container-fluid">

        <div class="row">

            <div class="col-md-2 bg-light menu">

                <div class="list-group mt-3">

                    <button class="list-group-item list-group-item-action active">

                        <i class="bi bi-house"></i>

                        Inicio

                    </button>

                    <button class="list-group-item list-group-item-action">

                        <i class="bi bi-box-seam"></i>

                        Pedidos

                    </button>

                    <button class="list-group-item list-group-item-action">

                        <i class="bi bi-people"></i>

                        Clientes

                    </button>

                    <button class="list-group-item list-group-item-action">

                        <i class="bi bi-truck"></i>

                        Repartidores

                    </button>

                    <button class="list-group-item list-group-item-action">

                        <i class="bi bi-graph-up"></i>

                        Reportes

                    </button>

                    <button
                        id="btnSalir"
                        class="list-group-item list-group-item-action text-danger">

                        <i class="bi bi-box-arrow-left"></i>

                        Cerrar sesión

                    </button>

                </div>

            </div>

            <div class="col-md-10">

                <div class="container mt-4">

                    <div class="alert alert-primary">

                        <h3>

                            👋 Bienvenido

                            <span id="bienvenida">

                            </span>

                        </h3>

                        <h5 id="pedidosAsignados">

                            Pedidos asignados: 0

                        </h5>

                    </div>

                    <div id="contenido">

                        <!-- Aquí aparecerán las tarjetas y la tabla -->

                    </div>

                </div>

            </div>

        </div>

    </div>

</div>

<script src="js/api.js"></script>

<script src="js/login.js"></script>

</body>

</html>
