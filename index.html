<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>OMALI | Sistema de Pedidos de Agua</title>

    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css">

    <!-- Google Charts -->
    <script src="https://www.gstatic.com/charts/loader.js"></script>

</head>

<body>

    <!-- ===================== -->
    <!-- ENCABEZADO -->
    <!-- ===================== -->

    <header>

        <div class="titulo">

            <h1>💧 OMALI</h1>
            <h2>Sistema de Control de Pedidos</h2>

        </div>

        <div class="fechaHora">

            <div>
                <strong>Fecha</strong><br>
                <span id="fecha">--/--/----</span>
            </div>

            <div>
                <strong>Hora</strong><br>
                <span id="hora">--:--:--</span>
            </div>

        </div>

    </header>

    <!-- ===================== -->
    <!-- TARJETAS -->
    <!-- ===================== -->

    <section class="contenedorCards">

        <div class="card entregado" data-estado="Entregado">
            <h3>Entregados</h3>
            <h1 id="totalEntregado">0</h1>
        </div>

        <div class="card recibido" data-estado="Recibido">
            <h3>Recibidos</h3>
            <h1 id="totalRecibido">0</h1>
        </div>

        <div class="card llenado" data-estado="En Llenado">
            <h3>En Llenado</h3>
            <h1 id="totalLlenado">0</h1>
        </div>

        <div class="card listo" data-estado="Listo para Entrega">
            <h3>Listos</h3>
            <h1 id="totalListo">0</h1>
        </div>

        <div class="card ruta" data-estado="En Ruta">
            <h3>En Ruta</h3>
            <h1 id="totalRuta">0</h1>
        </div>

        <div class="card cobrado" data-estado="Cobrado">
            <h3>Cobrados</h3>
            <h1 id="totalCobrado">0</h1>
        </div>

        <div class="card cancelado" data-estado="Cancelado">
            <h3>Cancelados</h3>
            <h1 id="totalCancelado">0</h1>
        </div>

    </section>

    <!-- ===================== -->
    <!-- BUSCADOR -->
    <!-- ===================== -->

    <section class="busqueda">

        <input
            type="text"
            id="buscar"
            placeholder="🔍 Buscar por pedido o cliente...">

    </section>

    <!-- ===================== -->
    <!-- TABLA -->
    <!-- ===================== -->

    <section class="tabla">

        <table>

            <thead>

                <tr>

                    <th>Pedido</th>
                    <th>Fecha</th>
                    <th>Hora</th>
                    <th>Cliente</th>
                    <th>Colonia</th>
                    <th>Dirección</th>
                    <th>Garrafones</th>
                    <th>Estado</th>
                    <th>Repartidor</th>

                </tr>

            </thead>

            <tbody id="tablaPedidos">

                <!-- Aquí JavaScript agregará los pedidos -->

            </tbody>

        </table>

    </section>

    <!-- ===================== -->
    <!-- FOOTER -->
    <!-- ===================== -->

    <footer>

        Última actualización:
        <strong id="ultimaActualizacion">--:--</strong>

    </footer>

    <!-- JavaScript -->
    <script src="js/script.js"></script>

</body>

</html>
