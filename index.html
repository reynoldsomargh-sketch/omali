<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pedidos de Agua</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background: #f5f5f5;
        }

        h1 {
            text-align: center;
        }

        .resumen {
            display: flex;
            justify-content: space-around;
            margin-bottom: 20px;
        }

        .card {
            background: white;
            padding: 15px;
            border-radius: 10px;
            width: 30%;
            text-align: center;
            box-shadow: 0 2px 5px rgba(0,0,0,.2);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
        }

        th, td {
            padding: 12px;
            border: 1px solid #ddd;
            text-align: center;
        }

        th {
            background: #0077cc;
            color: white;
        }

        .pendiente {
            color: red;
            font-weight: bold;
        }

        .ruta {
            color: orange;
            font-weight: bold;
        }

        .entregado {
            color: green;
            font-weight: bold;
        }

        @media(max-width:768px){
            .resumen{
                flex-direction:column;
                gap:10px;
            }

            .card{
                width:100%;
            }

            table{
                font-size:14px;
            }
        }
    </style>
</head>
<body>

<h1>🚚 Control de Pedidos de Agua</h1>

<div class="resumen">
    <div class="card">
        <h2>5</h2>
        <p>Pendientes</p>
    </div>

    <div class="card">
        <h2>3</h2>
        <p>En Ruta</p>
    </div>

    <div class="card">
        <h2>18</h2>
        <p>Entregados</p>
    </div>
</div>

<table>
    <thead>
        <tr>
            <th>Pedido</th>
            <th>Cliente</th>
            <th>Dirección</th>
            <th>Garrafones</th>
            <th>Estado</th>
        </tr>
    </thead>

    <tbody>
        <tr>
            <td>001</td>
            <td>Juan Pérez</td>
            <td>Las Palmas</td>
            <td>2</td>
            <td class="pendiente">Pendiente</td>
        </tr>

        <tr>
            <td>002</td>
            <td>María López</td>
            <td>Centro</td>
            <td>4</td>
            <td class="ruta">En Ruta</td>
        </tr>

        <tr>
            <td>003</td>
            <td>Carlos Gómez</td>
            <td>Terán</td>
            <td>1</td>
            <td class="entregado">Entregado</td>
        </tr>
    </tbody>
</table>

</body>
</html>
